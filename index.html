<!DOCTYPE html>
<html>
<head>
    <title>Safe Link Verification</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: #1e293b; padding: 30px; border-radius: 15px; text-align: center; border: 1px solid #334155; max-width: 300px; }
        .btn { display: block; background: #3b82f6; color: white; padding: 12px; border-radius: 8px; text-decoration: none; margin-top: 20px; font-weight: bold; }
        .btn:disabled { background: #334155; opacity: 0.5; }
    </style>
</head>
<body>
    <div class="card">
        <h3>Verify You Are Human</h3>
        <p>Please wait for the security check...</p>
        <button id="btn" class="btn" disabled>Wait (<span id="sec">5</span>s)</button>
    </div>

    <script>
        // Get the Telegram link from the URL automatically
        const params = new URLSearchParams(window.location.search);
        const target = params.get('target'); 

        let s = 5;
        const btn = document.getElementById('btn');
        const sec = document.getElementById('sec');

        const timer = setInterval(() => {
            s--;
            sec.innerText = s;
            if (s <= 0) {
                clearInterval(timer);
                btn.disabled = false;
                btn.innerText = "Join Channel Now";
            }
        }, 1000);

        btn.onclick = () => {
            if(target) window.location.href = atob(target); // Decodes the link for safety
            else alert("Error: No destination found!");
        };
    </script>
</body>
</html>
